<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyPeace - The peace of mind at thirty thousand feet</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', Georgia, serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: #f0f4f8;
            padding: 20px;
        }

        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .background-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1534088568595-a066f410bcda?auto=format&fit=crop&w=2000&q=80');
            background-size: cover;
            background-position: center;
            opacity: 0.12;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            width: 100%;
            padding: 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 8px;
        }

        .logo h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 52px;
            font-weight: 700;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.2;
        }

        .logo h1 .fly {
            color: #000000;
        }

        .logo h1 .peace {
            color: #5987e4;
        }

        .subtitle {
            text-align: center;
            font-style: italic;
            font-size: 17px;
            color: #6b7d8e;
            margin-bottom: 48px;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #3d4f5f;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 0.3px;
            font-style: normal;
        }

        .form-group input {
            width: 100%;
            padding: 16px 0;
            border: none;
            border-bottom: 1.5px solid #d0dae4;
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 16px;
            color: #2c3e50;
            transition: all 0.3s ease;
            background: transparent;
            outline: none;
        }

        .form-group input:focus {
            border-bottom-color: #5987e4;
        }

        .form-group input::placeholder {
            color: #bcc7d1;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            color: #3d4f5f;
            border: 1.5px solid #d0dae4;
            border-radius: 30px;
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            margin-top: 20px;
        }

        .submit-btn:hover {
            border-color: #5987e4;
            color: #5987e4;
            background: rgba(89, 135, 228, 0.04);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }

        .success-message h2 {
            font-family: 'Playfair Display', Georgia, serif;
            color: #5987e4;
            font-size: 26px;
            margin-bottom: 14px;
            font-weight: 600;
        }

        .success-message p {
            color: #6b7d8e;
            font-style: italic;
            font-size: 16px;
            line-height: 1.7;
        }

        .error-message {
            display: none;
            color: #c0392b;
            font-size: 14px;
            margin-bottom: 8px;
            text-align: center;
            font-style: normal;
        }

        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }

            .logo h1 {
                font-size: 40px;
            }

            .subtitle {
                font-size: 15px;
                margin-bottom: 36px;
            }

            .form-group input {
                padding: 14px 0;
                font-size: 15px;
            }

            .submit-btn {
                padding: 14px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="background-image"></div>

    <div class="container">
        <div class="logo">
            <h1><span class="fly">Fly</span><span class="peace">Peace</span></h1>
        </div>
        <p class="subtitle">the peace of mind at thirty thousand feet</p>

        <form id="flypeaceForm">
            <div class="error-message" id="errorMessage"></div>
            
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="Your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="+65 1234 5678" required>
            </div>

            <div class="form-group">
                <label for="message">Additional Information (Optional)</label>
                <input type="text" id="message" name="message" placeholder="Anything you'd like us to know?">
            </div>

            <button type="submit" class="submit-btn">Send form</button>
        </form>

        <div class="success-message" id="successMessage">
            <h2>Thank you</h2>
            <p>We've received your details and will be in touch shortly.</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('flypeaceForm');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();

            if (!fullName || !email || !phone) {
                showError('Please fill in all required fields.');
                return;
            }

            if (!isValidEmail(email)) {
                showError('Please enter a valid email address.');
                return;
            }

            const formData = new FormData(form);

            fetch('https://formspree.io/f/7640@protonmail.ch', {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            })
            .then(response => {
                if (response.ok) {
                    showSuccess();
                } else {
                    showError('Something went wrong. Please email us directly at 7640@protonmail.ch');
                }
            })
            .catch(error => {
                console.log('Form error:', error);
                showSuccess();
            });
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function showSuccess() {
            form.style.display = 'none';
            successMessage.style.display = 'block';
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }
    </script>
</body>
</html>
